version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: marketplace-mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - marketplace-network
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace-api
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prod}
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - marketplace-network
    deploy:
      resources:
        limits:
          memory: 2.5G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: marketplace-client
    ports:
      - "3001:80"
    networks:
      - marketplace-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: marketplace-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt # Removed :ro to allow cert updates if needed
      - certbot_challenge:/var/www/certbot:ro # Shared challenge directory
      - uploads_data:/app/uploads:ro
    depends_on:
      - app
      - client
    networks:
      - marketplace-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: marketplace-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_challenge:/var/www/certbot
    networks:
      - marketplace-network
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12d & wait $${!}; done'"

volumes:
  mysql_data:
    name: marketplace_mysql_data
  uploads_data:
    name: marketplace_uploads_data
  certbot_challenge:
    name: marketplace_certbot_challenge

networks:
  marketplace-network:
    name: marketplace_network
    driver: bridge